name: Deployment Pipeline [Production]
on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: tomlausmann@gmail.com
      DOCKER_PASSWORD: ${{ secrets.GH_TOKEN }}
      DOCKER_IMAGE: ghcr.io/lausi95/city-game/city-game-frontend:latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}
          # Persist BuildKit layer cache across runs so dependency layers are reused.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: [ build ]
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: tomlausmann@gmail.com
      DOCKER_PASSWORD: ${{ secrets.GH_TOKEN }}
    environment:
      name: production
      url: https://misterx.lausi95.net
    steps:
      - uses: actions/checkout@v7
      - name: Setup SSH
        shell: bash
        run: |
          eval `ssh-agent -s`
          mkdir -p /home/runner/.ssh/
          touch /home/runner/.ssh/id_rsa
          echo -e "${{ secrets.SSH_PRIVATE_KEY }}" > /home/runner/.ssh/id_rsa
          chmod 700 /home/runner/.ssh/id_rsa
          ssh-keyscan -t rsa,dsa,ecdsa,ed25519 lausi95.net >> /home/runner/.ssh/known_hosts
      - name: Run ansible script
        shell: bash
        run: |
          sudo service ssh start
          sudo service ssh status
          cd ansible
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > vault_password.yml
          cat deploy-prod.yml
          ansible-playbook -vvv -e "ansible_user=tom" --vault-password-file=vault_password.yml --private-key /home/runner/.ssh/id_rsa -i hosts.yml deploy-prod.yml